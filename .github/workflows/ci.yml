name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .

      - name: Unit tests
        run: python -m pytest -q tests

  integration:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: glpi
          MYSQL_USER: glpi
          MYSQL_PASSWORD: glpi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run integration tests (requires GLPI endpoint)
        env:
          GLPI_INTEGRATION_BASE_URL: ${{ secrets.GLPI_INTEGRATION_BASE_URL }}
          GLPI_INTEGRATION_USER_TOKEN: ${{ secrets.GLPI_INTEGRATION_USER_TOKEN }}
          GLPI_INTEGRATION_APP_TOKEN: ${{ secrets.GLPI_INTEGRATION_APP_TOKEN }}
          GLPI_INTEGRATION_CLIENT_ID: ${{ secrets.GLPI_INTEGRATION_CLIENT_ID }}
          GLPI_INTEGRATION_CLIENT_SECRET: ${{ secrets.GLPI_INTEGRATION_CLIENT_SECRET }}
          GLPI_INTEGRATION_USERNAME: ${{ secrets.GLPI_INTEGRATION_USERNAME }}
          GLPI_INTEGRATION_PASSWORD: ${{ secrets.GLPI_INTEGRATION_PASSWORD }}
        run: python -m pytest -q tests/integration
